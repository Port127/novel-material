# Novel Material V2 - LLM 配置
llm:
  provider: openai
  model: gpt-4o-mini
  api_key: "sk-xxx"
  base_url: "https://api.openai.com/v1"
  max_tokens: 500
  temperature: 0.3
  rate_limit_seconds: 1  # 连续调用间隔（秒），避免触发 API 限速

chapter_analyze:
  system_prompt: |
    你是专业的小说分析助手，负责对每章内容生成摘要和分析。
    要求：
    1. 摘要 50-100 字，包含关键事件、情感基调、人物互动
    2. chapter_function 从标签字典的章节功能标签中选取
    3. 准确识别出场人物（仅写名字，不写描述）
    4. tension_level 1-5，根据紧张程度评估
