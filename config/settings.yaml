# settings.yaml — 非敏感配置（受版本控制，可追踪变更）
# 敏感信息（API Key、密码）保留在 .env

# ──────────────────────────────────────────────
# LLM 请求参数
# ──────────────────────────────────────────────

# 单次调用输出上限（tokens）
LLM_MAX_TOKENS: 8000

# 生成温度（0-1），越低越稳定
LLM_TEMPERATURE: 0.3

# 每批章节分析完成后等待秒数，避免触发速率限制
LLM_RATE_LIMIT_SECONDS: 10

# ──────────────────────────────────────────────
# LLM 批量处理
# ──────────────────────────────────────────────

# 一次 API 调用同时分析多少章（推荐 5-30，章节内容长用小值）
LLM_CHAPTER_BATCH_SIZE: 10

# 单章输入截断上限（tokens），超长部分被截断
LLM_MAX_CHAPTER_TOKENS: 5000

# ──────────────────────────────────────────────
# LLM 超时配置（各阶段，单位：秒）
# ──────────────────────────────────────────────

LLM_ANALYZE_TIMEOUT: 3000        # 章级分析（原文输入，耗时长）
LLM_OUTLINE_TIMEOUT: 3000        # 大纲生成
LLM_WORLDBUILDING_TIMEOUT: 1800  # 世界观提取
LLM_CHARACTERS_TIMEOUT: 1800     # 人物提取（两轮调用）
LLM_OTHER_TIMEOUT: 300           # 其他小任务（兜底）

# ──────────────────────────────────────────────
# 摘要池 Token 上限（各阶段输入量）
# ──────────────────────────────────────────────

LLM_OUTLINE_SUMMARY_TOKENS: 20000         # 大纲生成
LLM_OUTLINE_SEQ_SUMMARY_TOKENS: 8000      # 单序列节拍生成
LLM_WORLDBUILDING_SUMMARY_TOKENS: 20000   # 世界观提取
LLM_CHARACTERS_SUMMARY_TOKENS: 15000      # 人物提取（每轮）

# ──────────────────────────────────────────────
# LLM 多样性控制（解决后期敷衍问题）
# ──────────────────────────────────────────────

# 动态系统提示词开关（根据进度注入多样性提醒）
LLM_DYNAMIC_PROMPT_ENABLED: true

# 多样性唤醒间隔（每隔多少批次插入独立性提醒）
LLM_DIVERSITY_REMINDER_INTERVAL: 10

# 后期章节阈值（进度超过此比例时启用特殊策略）
LLM_LATE_CHAPTER_THRESHOLD: 0.6

# 后期温度增加值（基础温度 + 此值）
LLM_LATE_TEMPERATURE_BOOST: 0.15

# 温度上限（不超过此值）
LLM_TEMPERATURE_MAX: 0.6

# 动态温度开关（后期章节自动提高温度）
LLM_DYNAMIC_TEMPERATURE_ENABLED: true

# 相似度警告阈值（摘要相似度超过此值发出警告）
LLM_SIMILARITY_WARNING_THRESHOLD: 0.7

# 相似度采样窗口（最近多少章用于相似度比较）
LLM_SIMILARITY_WINDOW: 10

# ──────────────────────────────────────────────
# LLM Thinking 模式配置
# ──────────────────────────────────────────────

# thinking tokens 最小阈值（低于此值发出警告）
# thinking_budget 通常设为 12000，阈值建议设为 1000-2000
LLM_THINKING_TOKENS_MIN_THRESHOLD: 1000

# ──────────────────────────────────────────────
# LLM 定价（用于成本估算）
# ──────────────────────────────────────────────

LLM_PRICE_INPUT_1K: 0.0004
LLM_PRICE_OUTPUT_1K: 0.0012

# ──────────────────────────────────────────────
# 路径配置（留空则使用项目内默认值）
# ──────────────────────────────────────────────

NOVELS_DIR: ""
GLOBAL_INDEX: ""
