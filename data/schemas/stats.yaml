# stats.yaml schema
# 全书统计数据（由 novel-stats 生成）
# 路径: data/novels/{material_id}/stats.yaml
# 配套可视化报告:
#   data/novels/{material_id}/stats.md   — 轻量 Mermaid 版
#   data/novels/{material_id}/stats.html — 交互版（ECharts + 关系图谱）

# ====================================================================
# 字段说明
# ====================================================================
#
# 对全书事件、人物、情感、技法进行量化统计。
# 钩子系统统一从事件 hooks 字段和 plot_function 采集。
#
# R = 必填, O = 可选

# ====================================================================
# 基本信息
# ====================================================================

material_id: nm_xxx                             # R | 素材ID
generated_at: "2026-04-05T12:00:00Z"            # R | 报告生成时间

# ====================================================================
# 基础数据
# ====================================================================

basics:
  total_chapters: 1070                          # R | 总章节数
  total_events: 907                             # R | 总事件数
  avg_events_per_chapter: 0.85                  # R | 平均每章事件数

# ====================================================================
# 事件类型分布
# ====================================================================

event_type_distribution:
  - type: 日常                                  # R | tags.yaml → event_type
    count: 203                                  # R | 出现次数
    ratio: 0.224                                # R | 占比 (0.0-1.0)
  - type: 争吵
    count: 87
    ratio: 0.096

# ====================================================================
# 冲突类型分布
# ====================================================================

conflict_distribution:
  - type: 情感                                  # R | tags.yaml → conflict
    count: 250                                  # R | 出现次数
    ratio: 0.276                                # R | 占比 (0.0-1.0)

# ====================================================================
# 转折统计
# ====================================================================

turning_points:
  total: 45                                     # R | 转折点总数
  events:                                       # R | 转折事件列表
    - event: ev_main_005
      chapter: 89
      title: "事件标题"
      type: 转折                                # tags.yaml → plot_function
  rhythm:
    avg_interval: 23.7                          # R | 平均间隔（章节数）
    min_interval: 3
    max_interval: 89
    assessment: "前密后疏，第二幕转折最为密集"   # O | 节奏评估

# ====================================================================
# 紧张度曲线（按章）
# ====================================================================

tension_curve:
  - chapter: 1                                  # R | 章节号
    avg_tension: 2.0                            # R | 平均张力值
    max_tension: 2                              # R | 最大张力值
  - chapter: 2
    avg_tension: 2.5
    max_tension: 3

# ====================================================================
# 节奏分布
# ====================================================================

pacing_distribution:                            # R | tags.yaml → pacing
  加速: 150
  减速: 120
  爆发: 80
  喘息: 200
  蓄力: 250
  骤停: 15
pacing_pattern: "蓄力→爆发→喘息循环，约每50章一个大周期"  # O | 节奏模式总结

# ====================================================================
# 钩子统计（钩子系统统一采集）
# ====================================================================

hooks_stats:
  # 总体统计
  total_hooks: 45                               # R | 钩子总数
  verified_hooks: 38                            # R | 已验证回收
  pending_hooks: 7                              # R | 待回收
  verification_rate: 0.84                       # R | 验证回收率 (0.0-1.0)

  # 按类型分布
  by_type:                                      # R | 钩子类型分布
    道具钩子: 15
    人物钩子: 12
    悬念钩子: 8
    信息钩子: 6
    情感钩子: 4

  # 按铆合形式分布
  by_crossing:                                  # R | 铆合形式分布
    反转铆合: 15                                # 反转铆合（传统"伏笔"）
    因果铆合: 20                                # 因果关联
    悬念铆合: 8                                 # 章末悬念
    期待铆合: 7                                 # 期待兑现

  # 按来源分布
  by_source:                                    # R | 钩子来源分布
    hooks_field: 30                             # 来自事件 hooks 字段
    plot_function: 15                           # 来自 plot_function 反转铆合

  # 跨度统计
  avg_span: 234                                 # R | 平均跨度（章节数）
  longest:                                      # O | 最长跨度钩子
    hook_id: hook_007
    planted_chapter: 3
    harvested_chapter: 956
    span: 953
    crossing_type: 反转铆合
  shortest:                                     # O | 最短跨度钩子
    hook_id: hook_010
    planted_chapter: 100
    harvested_chapter: 103
    span: 3
    crossing_type: 悬念铆合

  # 待回收详情
  pending_list:                                 # O | 待回收钩子列表
    - hook_id: hook_003
      hook_type: 信息钩子
      crossing_type: 反转铆合
      planted_chapter: 12
      detail: "待回收的钩子描述"
      confidence: low

# ====================================================================
# 人物统计
# ====================================================================

character_stats:
  total_named: 85                               # R | 有名有姓的角色数
  top_appearances:                              # R | 出场最多的角色 Top-N
    - name: 陈汉升
      events: 780
      ratio: 0.86                               # 出场事件占比
    - name: 萧容鱼
      events: 234
      ratio: 0.26
  moment_distribution:                          # R | tags.yaml → character_moment
    性格展示: 320
    道德抉择: 45
    成长顿悟: 28

# ====================================================================
# 情感统计
# ====================================================================

emotion_stats:
  dominant: [紧张, 温馨, 平静]                   # R | 主导情绪列表
  reader_effect_distribution:                   # R | tags.yaml → reader_effect
    会心一笑: 189
    揪心: 78
    催泪: 45
    爽感: 120

# ====================================================================
# 技法统计
# ====================================================================

craft_stats:
  technique_distribution:                       # R | tags.yaml → technique
    对比: 150
    闪回: 80
    象征隐喻: 45
  dialogue_distribution:                        # R | tags.yaml → dialogue_type
    争吵: 87
    试探: 120
    告白: 35

# ====================================================================
# 人物关系图谱数据（用于 stats.html 可视化）
# ====================================================================

relationship_graph:
  nodes:                                        # R | 人物节点列表
    - name: "角色名"
      role: protagonist                         # protagonist / antagonist / supporting / minor
      faction: "所属阵营"
      events: 780                               # 出场事件数
  edges:                                        # R | 关系边列表
    - from: "角色A"
      to: "角色B"
      type: "关系类型"
      weight: 3                                 # 关系强度（互动事件数）
