# plot_index.yaml schema
# 跨小说剧情结构全局索引
# 路径: data/plot_index.yaml
# 由 build-index 自动聚合，只读

# ====================================================================
# 字段说明
# ====================================================================
#
# 跨书剧情索引，用于横向比较不同小说的结构特征。
# 每个条目对应一部已 completed 的素材。
#
# R = 必填, O = 可选

# ====================================================================
# 条目列表
# ====================================================================

entries:
  - material_id: nm_xxx                         # R | 素材ID
    novel_name: "《书名》"                       # R | 书名
    genre: [科幻]                                # R | 从小说级 tags.yaml 读取
    total_events: 907                           # R | 事件总数

    structure:
      plot_stages:                              # R | 各阶段事件分布（tags.yaml → plot_stage）
        开篇: 15
        第一幕-诱因: 45
        第一幕-发展: 120
        第二幕-对抗: 280
        中点: 30
        第二幕-低谷: 150
        第三幕-高潮: 180
        第三幕-收束: 70
        尾声: 17
      turning_points:                           # R | 主要转折点（3-8 个）
        - chapter: 89
          description: "简要描述"
          plot_function: 转折                   # tags.yaml → plot_function
      hooks_count: 42                           # R | 钩子总数
      hooks_verified: 38                        # R | 已验证回收的钩子数

    dominant_functions:                         # R | 高频情节功能 Top-5
      - {function: 铺垫, count: 320}            # function: tags.yaml → plot_function

    pacing_profile:
      avg_tension: 3.2                          # R | 全书平均张力
      peak_tension_chapter: 302                 # R | 张力最高章节
      tension_variance: 1.1                     # R | 张力方差（节奏波动度）
