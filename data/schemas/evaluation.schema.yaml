# evaluation.yaml schema
# 总体评估结果
# 路径: data/novels/{material_id}/meta/evaluation.yaml
#
# 由 pipeline/evaluate.py 生成
# 用于为章级分析提供全局上下文（阶段二输入）

# ====================================================================
# 字段说明
# ====================================================================
#
# R = 必填（required），O = 可选（optional）

schema_version: "2.0.1"              # R | Schema 版本

novel_type:                          # R | 小说类型（1-3个，从 tags.yaml选取）
  - 玄幻
  - 修真文明

main_thread_summary: "主线情节概要，200-300字"  # R | 主线概要

total_chapters: 912                  # R | 章节总数

core_characters_hint:                # R | 核心人物提示（3-10个）
  - 许七安
  - 怀庆公主
  - 许新年
  - 魏渊

stage_summaries:                     # R | 分阶段概要（5个阶段）
  1: "开篇阶段：破案自救，结识关键人物..."
  2: "发展阶段：修炼入门，势力博弈..."
  3: "高潮阶段：揭开真相，危机逼近..."
  4: "转折阶段：高潮战斗，命运抉择..."
  5: "收尾阶段：结局收束，后续伏笔..."

evaluation_timestamp: "2026-05-09T10:00:00Z"  # R | 评估时间

# ====================================================================
# 约束规则
# ====================================================================
#
# 1. novel_type：最多3个，必须在 tags.yaml 的 genre_primary中存在
# 2. main_thread_summary：200-300字
# 3. core_characters_hint：至少3个，最多10个
# 4. stage_summaries：必须包含5个阶段（1-5）
# 5. 每个阶段概要：100字左右

# ====================================================================
# 相关文件
# ====================================================================
#
# evaluation.yaml → 本文件，evaluate 阶段生成
# chapters.yaml → 章级分析，analyze 阶段生成（阶段二使用本文件作为上下文）
# meta.yaml → 小说元信息，包含 status 字段