# ====================================================================
# tags.yaml - 多维标签字典
# ====================================================================
#
# 分层架构：
#   ├── 核心层（Core）：必选，通用维度，稳定不变
#   ├── 扩展层（Extend）：可选，按主题域组织，可按需加载
#   └── 自定义层（Custom）：用户通过 /tag-add 自定义扩展
#
# 扩展机制：
#   - 扩展层维度（如 event_type）采用 core + domains 结构
#   - domains 按主题域包组织（romance/politics/martial/mystery/family）
#   - 用户可通过 /tag-add {维度} {主题域} 加载域包
#   - 用户可通过 /tag-add {维度} custom {值} 添加自定义值
#
# ====================================================================

# ====================================================================
# 扩展层（E部分）- 事件级维度
# ====================================================================

event_type:
  description: 事件类型（分层：core + domains）
  # 核心子类（必选，通用）
