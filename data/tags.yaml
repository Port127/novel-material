# 全局标签维度字典
# 定义所有合法的标签维度及其可选值
# 由 /tag-add /tag-merge 维护
# 场景标签和小说标签均从此字典中选取

# ============================================================
# A. 场景内容层 — 发生了什么
# ============================================================

scene_type:
  description: 场景类型
  values:
    - 争吵              # 言语冲突，未必分胜负
    - 告白              # 情感表白/心意袒露
    - 对决              # 有胜负/生死结果的正面交锋
    - 密谋              # 背着某方的暗中策划
    - 逃亡              # 被动脱离危险
    - 修炼              # 自我提升过程（无通过/失败标准）
    - 探秘              # 探索未知区域/揭秘
    - 审讯              # 拷问/逼供/情报提取
    - 追逐              # 追击/逃跑的动态场景
    - 宴会              # 酒宴/庆典/社交集会
    - 葬礼              # 送别死者
    - 祭祀              # 祭奠/献祭/宗教仪式
    - 旅途              # 在路上，途中见闻
    - 独处              # 单人场景（区别于日常：无他人互动）
    - 回忆              # 角色主观追忆真实过去
    - 梦境              # 非真实的意象化场景
    - 日常              # 多人互动但无核心冲突
    - 战争              # 大规模军事冲突
    - 营救              # 救援行动
    - 谈判              # 双方公开博弈/协商
    - 伏击              # 预设陷阱的突然袭击
    - 考验              # 有明确通过/失败标准的测试
    - 仪式              # 广义仪式（结盟/加冕/传位）
    - 觉醒              # 能力/意识/身份的激活/顿悟
    - 潜入                # 偷潜敌营/禁地
    - 赌局                # 博弈/豪赌/拍卖
    - 庭审                # 审判/公堂对质
    - 医疗                # 治伤/解毒/手术
    - 教学                # 传授/讲道/演示
    - 誓约                # 结盟/立誓/盟约

conflict:
  description: 冲突类型
  values:
    - 价值观            # 双方都认为自己正确
    - 误会              # 信息不对称导致，真相可消解
    - 利益              # 明确的资源/好处争夺
    - 生死              # 性命攸关的直接对抗
    - 情感              # 感情纠葛引发的矛盾
    - 立场              # 不同阵营/派系的冲突
    - 信仰              # 宗教/理想/主义之争
    - 权力              # 谁说了算/谁掌权
    - 忠诚              # 效忠对象的冲突（如忠君vs忠友）
    - 身份              # 真实身份带来的矛盾
    - 道德              # "该不该做"的内心挣扎
    - 人与自我            # 内心矛盾/自我怀疑/欲望vs理性
    - 人与命运            # 不可抗力/宿命/天灾
    - 人与社会            # 制度/规则/阶层压迫
    - 人与自然            # 生存/环境/灾变
    - 资源争夺            # 灵石/秘籍/地盘
    - 新旧冲突            # 改革vs守旧/传统vs变革

stakes:
  description: 赌注（场景中赌上了什么）
  values:
    - 生死              # 性命
    - 荣辱              # 名声/面子/尊严
    - 情感              # 感情关系的维系或破裂
    - 信念              # 信仰/理想/人生信条
    - 自由              # 人身自由或精神自由
    - 世界存亡          # 文明/世界级别的生死
    - 身份秘密          # 隐藏身份一旦曝光的后果
    - 权力地位          # 职位/等级/话语权
    - 承诺              # 誓言/约定的遵守或违背
    - 真相              # 隐藏的事实/秘密
    - 族群存续            # 家族/种族/门派的延续
    - 道心                # 修炼/信仰根基
    - 底线                # 人格/原则底线

# ============================================================
# B. 人物层 — 谁和谁、怎么互动
# ============================================================

relationship:
  description: 人物关系
  values:
    - 恋人
    - 师徒
    - 对手
    - 父子
    - 母女
    - 挚友
    - 君臣
    - 同门
    - 主仆
    - 陌生人
    - 暗恋
    - 仇人
    - 盟友
    - 兄弟姐妹
    - 上下级
    - 同伴

interaction:
  description: 互动方式
  values:
    - 对抗              # 正面冲突/敌对
    - 合作              # 为共同目标协作
    - 试探              # 互相摸底/试探虚实
    - 告别              # 分离/送行
    - 重逢              # 久别后再会
    - 背叛              # 信任被打破
    - 守护              # 保护他人/挡在前面
    - 牺牲              # 以自身代价换取
    - 教导              # 传授/指引
    - 求助              # 请求帮助
    - 利用              # 把对方当工具
    - 和解              # 化敌为友/消除误解
    - 挑衅              # 故意激怒/挑战
    - 暗中观察          # 未暴露地观察/跟踪
    - 并肩作战          # 共同面对外敌
    - 拉拢              # 招揽/收买
    - 托付              # 临终托孤/交付使命
    - 欺骗
    - 较量              # 非战斗的竞赛/比试
    - 传承              # 功法/遗物/信念传递

power_dynamic:
  description: 权力位差
  values:
    - 平等              # 双方地位对等
    - 上对下            # 强势方对弱势方
    - 下对上            # 弱势方面对强势方
    - 翻转              # 场景内位差发生逆转
    - 此消彼长          # 持续拉锯/博弈，非单次翻转

character_moment:
  description: 人物弧光时刻
  values:
    - 性格展示          # 通过行动展现角色性格（非变化）
    - 性格转变          # 角色性格发生可观察到的改变
    - 内心独白          # 大段心理活动揭示内在
    - 道德抉择          # 面临"对vs对"或"错vs错"的选择
    - 成长顿悟          # 领悟/蜕变/升华
    - 堕落滑落          # 价值观/行为向黑暗面倾斜
    - 信念崩塌          # 长期坚持的信念被打碎
    - 信念重建          # 在废墟上建立新的信念
    - 身份揭示          # 隐藏身份被揭开/公开
    - 初次亮相          # 角色首次登场的定义性场景
    - 最终抉择          # 全书级别的终极选择
    - 执念暴露            # obsession 公开化/失控
    - 软肋被击            # soft_spot 被利用/伤害
    - 对照时刻            # 两个角色的镜像对比
    - 旧创复发            # tragedy_trigger 再次触发
    - 面具脱落            # contrast_habit 被识破/伪装剥离

moral_spectrum:
  description: 道德光谱
  values:
    - 正义              # 场景中的道德倾向明确正面
    - 灰色              # 善恶界限模糊
    - 黑暗              # 道德底线被突破
    - 亦正亦邪          # 同时包含善与恶的行为
    - 被迫为恶          # 外部压力迫使角色做违心之事

archetype:
  description: 角色原型
  values:
    - 英雄              # 面对挑战、证明价值
    - 导师              # 传授/引导/指路
    - 门槛守卫          # 拦路/设门槛/考验是否配得上
    - 信使              # 带来打破日常的消息/变化
    - 变形者            # 立场不明，忽敌忽友
    - 影子              # 主角的黑暗面/对立镜像
    - 盟友              # 陪伴主角、提供支持
    - 骗术师            # 打破规则、出人意料
    - 逗乐者            # 以幽默化解紧张/活跃气氛
    - 小人物            # 平凡角色，映射普通人
    - 天真者              # 追求安全与幸福，易受欺骗
    - 孤儿/常人          # 追求归属，脚踏实地
    - 反叛者              # 挑战规则/颠覆秩序
    - 创造者              # 构建新事物/新秩序
    - 照顾者              # 保护他人/自我牺牲
    - 探索者              # 追寻自由/不断开拓
    - 统治者              # 掌控欲/秩序维护者
    - 殉道者              # 以牺牲成就信念

narrative_function:
  description: 叙事功能
  values:
    - 推动主线          # 直接推进核心剧情
    - 提供信息          # 主要作用是传递信息给读者/角色
    - 制造冲突          # 主要作用是制造/升级矛盾
    - 缓解气氛          # 在紧张段落间提供喘息
    - 主题承载          # 场景直接表达作品主题
    - 镜像对照          # 两个角色/事件形成对照
    - 情感锚点          # 建立读者与角色的情感连接
    - 工具人            # 服务于剧情推进，无独立弧线
    - 世界观展示        # 展示设定/规则/背景知识
    - 道德试金石          # 考验主角选择的存在
    - 催化剂              # 促使角色/事件转变的触发者
    - 悬念载体            # 身上挂着未解之谜

# ============================================================
# C. 情感层 — 什么感受
# ============================================================

emotion:
  description: 情绪基调
  values:
    - 紧张              # 高烈度，即将发生冲突
    - 温馨              # 暖意、亲情、友情的正面情感
    - 悲伤              # 指向当下的痛/失去
    - 愤怒              # 外向的攻击性情绪
    - 诡秘              # 神秘/不祥/暗流涌动
    - 燃                # 激昂/振奋/战斗高扬
    - 绝望              # 还有痛感，尚未到麻木
    - 释然              # 放下/释怀/如释重负
    - 孤独              # 独自面对/无人理解
    - 恐惧              # 面对威胁的畏惧
    - 狂喜              # 极度兴奋/欣喜若狂
    - 麻木              # 情感耗尽，不再有痛感
    - 挣扎              # 仍在反抗/拉扯
    - 平静              # 无波澜，可能是暴风雨前的宁静
    - 怀念              # 指向过去的温暖中带失落
    - 屈辱              # 内向的自尊受伤
    - 敬畏              # 面对伟大/不可测事物的震撼
    - 不安              # 低烈度焦虑，暴风雨前的气氛
    - 嫉妒
    - 羞愧
    - 悔恨
    - 无奈              # 有心无力/明知不可为
    - 癫狂              # 走火入魔/理智崩溃
    - 窃喜              # 暗中得意/侥幸

reader_effect:
  description: 期望读者感受
  values:
    - 催泪              # 读者流泪/鼻酸
    - 爽感              # 畅快/扬眉吐气/逆袭成功
    - 窒息              # 压迫感/喘不过气
    - 治愈              # 温暖抚慰/疗愈心灵
    - 震撼              # 被情节/场面震慑
    - 细思恐极          # 表面正常、越想越恐怖
    - 心疼              # 对角色遭遇的怜惜
    - 解气              # 恶人受惩/公道到来
    - 揪心              # 为角色命运担忧
    - 释然              # 心结打开/终于放下
    - 毛骨悚然          # 恐惧/汗毛竖起
    - 会心一笑          # 幽默/机智带来的轻快
    - 热血沸腾          # 燃/激昂/想站起来鼓掌
    - 怅然若失          # 淡淡的失落/意难平
    - 拍案叫绝          # 叙事反转/精巧布局
    - 欲罢不能          # 强节奏钩子，阅读惯性
    - 如释重负          # 长期悬念终于解开
    - 唏嘘              # 世事无常/物是人非

# ============================================================
# D. 结构层 — 在故事中的位置和作用
# ============================================================

plot_stage:
  description: 剧情阶段
  values:
    - 开篇
    - 第一幕-诱因
    - 第一幕-发展
    - 第二幕-对抗
    - 中点
    - 第二幕-低谷
    - 第三幕-高潮
    - 第三幕-收束
    - 尾声

plot_function:
  description: 情节功能
  values:
    - 铺垫              # 显性准备，读者能感到在为某事蓄力
    - 转折              # 剧情方向改变
    - 升级              # 冲突/挑战/能力提升一个等级
    - 高潮              # 弧线的最高潮点
    - 收束              # 弧线的收尾/后续处理
    - 伏笔埋设          # 隐性信息，读者未必注意到
    - 伏笔回收          # 此前埋下的伏笔在此兑现
    - 并线              # 两条剧情线汇合到同一事件
    - 分流              # 一条线分裂为多条线
    - 呼应              # 遥远场景间的因果回响
    - 反转              # 认知颠覆，之前信以为真的被推翻
    - 节奏调节          # 纯粹用于调节叙事节奏的过渡
    - 信息揭示          # 向读者或角色揭示关键信息

pacing:
  description: 节奏型
  values:
    - 加速              # 事件密度提高、叙事提速
    - 减速              # 放慢节奏，细写情感/环境
    - 爆发              # 瞬间释放积累的张力
    - 喘息              # 高潮后的短暂休息
    - 蓄力              # 压着不爆，持续积累张力
    - 骤停              # 戛然而止，留悬念

# ============================================================
# E. 技法层 — 怎么实现的
# ============================================================

technique:
  description: 叙事技法
  values:
    - 对比              # 并置对立元素以突出差异
    - 留白              # 省略关键信息，让读者自行填补
    - 蒙太奇            # 快速切换多个画面/场景片段
    - 闪回              # 插入过去时间的片段
    - 视角切换          # 场景内切换叙述视角
    - 环境映射          # 以环境/天气映射角色心境
    - 象征隐喻          # 用具体物象承载抽象含义
    - 反讽              # 表面含义与实际含义相反
    - 平行叙事          # 两条故事线同时推进
    - 意识流            # 无序的心理活动流
    - 嵌套叙事          # 故事中讲述另一个故事
    - 不可靠叙述        # 叙述者的可信度存疑
    - 时间跳跃          # 跳过一段时间不叙述
    - 倒叙              # 先果后因
    - 白描              # 不加修饰的简笔勾勒
    - 细节放大          # 聚焦微小细节以传递深意
    - 重复与变奏        # 相似场景/句式反复出现但有变化
    - 通感                # 跨感官联动（"声音有毛茸茸的边缘"）
    - 零度描写            # 余华式克制叙事，以冷写热
    - 悬念钩子            # 章末/段末设钩，制造阅读期待
    - 草蛇灰线            # 长线伏笔，千里之外回收
    - 预叙                # 预先暗示未来事件（"多年以后…"）
    - 延宕                # 故意拖延揭示，延长期待
    - 戏中戏              # 故事内部的表演/讲述另一个故事
    - 陌生化              # 打破习惯认知，以全新视角描写熟悉事物
    - 多声部              # 多角色/多立场同时发声，形成复调

dialogue_type:
  description: 对话类型
  values:
    - 争吵              # 双方言语激烈对抗
    - 说服              # 一方试图改变另一方想法
    - 审讯              # 单向逼问/套取信息
    - 试探              # 通过言语摸底对方态度
    - 告白              # 情感表达/吐露心声
    - 独白              # 自言自语/旁白/内心话语外化
    - 寒暄下的暗斗      # 客套话中暗藏机锋
    - 教学              # 讲解/传授/答疑
    - 谈判              # 双方就条件进行协商
    - 威胁              # 以力量/后果施压
    - 安慰              # 情感支持/开导
    - 多人混战          # 多方同时发言、各说各话
    - 言不由衷          # 说出来的和心里想的相反
    - 以退为进          # 表面退让实为获取更大利益
    - 沉默对峙          # 关键是"不说话"传递的信息
    - 遗言              # 临终/诀别时的话
    - 指桑骂槐          # 表面说A实际骂B
    - 自嘲              # 以自贬示弱/化解尴尬
    - 激将              # 故意刺激对方以达到目的
    - 打哑谜            # 双方都心知肚明却不明说

pov:
  description: 视角
  values:
    - 第一人称
    - 第三人称限制
    - 全知
    - 多视角轮转
    - 旁观者

info_delivery:
  description: 信息投放方式
  values:
    - 自然嵌入          # 信息融入叙事流中不着痕迹
    - 角色口述          # 角色直接讲述/解说
    - 闪回              # 通过回忆片段传递信息
    - 文献引用          # 引用书信/文件/碑文等
    - 环境暗示          # 通过环境细节暗示信息
    - 对话带出          # 在对话中自然带出信息
    - 内心独白带出      # 角色内心活动中传递信息
    - 行动展示          # 通过角色行动而非言语展示（show don't tell）
    - 误导性揭示          # 给出部分真相以制造误判
    - 渐进拼图            # 多场景碎片逐步拼出全貌

# ============================================================
# F. 场景物理层 — 在什么环境中
# ============================================================

setting:
  description: 空间类型
  values:
    - 室内
    - 户外
    - 地下
    - 高空
    - 水下
    - 密闭空间
    - 广阔战场
    - 街巷
    - 宫殿
    - 山野
    - 都市
    - 荒漠
    - 船上
    - 废墟
    - 秘境
    - 市集                # 集市/夜市/拍卖会
    - 监牢
    - 书院                # 学堂/学院/宗门
    - 边境                # 边关/前线/界域
    - 异空间              # 幻境/结界/独立空间

scale:
  description: 场景人数规模
  values:
    - 独角戏
    - 双人戏
    - 三角
