# Material Skills Regression Tasks
# Skill 功能回归测试任务集

tasks:

  - task_id: material-add-001
    skill: material-add
    description: 添加小说素材到素材库
    input:
      path: "data/novels/test-sample.txt"
      type: novel
    expected_output:
      folder_created: true
      meta_yaml_exists: true
      source_txt_exists: true
      scenes_dir_exists: true
      index_updated: true
      id_format: "nm_novel_*"
      meta_fields: ["material_id", "type", "name", "author", "source", "added", "status"]
      status: raw
    grader: deterministic

  - task_id: novel-outline-001
    skill: novel-outline
    description: 为入库小说生成故事大纲
    input:
      material_id: nm_novel_test_xxxx
    expected_output:
      outline_yaml_exists: true
      outline_fields: ["material_id", "premise", "structure", "foreshadowing"]
      structure_has_acts: true
      status_updated: outlined
    grader: deterministic

  - task_id: novel-characters-001
    skill: novel-characters
    description: 为入库小说生成人物体系
    input:
      material_id: nm_novel_test_xxxx
    expected_output:
      characters_yaml_exists: true
      roster_not_empty: true
      relations_not_empty: true
      arc_fields: ["stage", "state", "chapter"]
    grader: deterministic

  - task_id: novel-tags-001
    skill: novel-tags
    description: 为入库小说生成整体标签
    input:
      material_id: nm_novel_test_xxxx
    expected_output:
      tags_yaml_exists: true
      tags_fields: ["material_id", "genre", "theme", "tone", "narrative", "style", "good_for"]
      tags_from_dictionary: true
      status_updated: tagged
    grader: deterministic

  - task_id: novel-scenes-001
    skill: novel-scenes
    description: 按章节范围拆分场景并打多维标签
    input:
      material_id: nm_novel_test_xxxx
      chapter_range: "1-3"
    expected_output:
      scene_files_created: true
      scene_id_format: "ch*_s*"
      scene_has_6_layers: true
      tag_layers: ["content", "people", "emotion", "structure", "craft", "setting"]
      tags_from_dictionary: true
      summary_length: "50-100字"
    grader: deterministic

  - task_id: material-search-001
    skill: material-search
    description: 关键词检索素材
    input:
      keyword: "修真"
    expected_output:
      results_returned: true
      result_count: "1-10"
      format_valid: true
    grader: deterministic

  - task_id: material-search-scene-001
    skill: material-search-scene
    description: 按多维标签检索场景（自然语言）
    input:
      query: "恋人之间吵架的场景"
    expected_output:
      tags_parsed: true
      parsed_includes: ["relationship: 恋人", "scene_type: 争吵"]
      scenes_returned: true
      format_valid: true
    grader: rubric

  - task_id: material-search-scene-002
    skill: material-search-scene
    description: 按多维标签检索场景（复合需求）
    input:
      query: "弱者反杀强者的对决"
    expected_output:
      tags_parsed: true
      parsed_includes: ["power_dynamic: 翻转", "scene_type: 对决"]
      scenes_returned: true
      format_valid: true
    grader: rubric

  - task_id: tag-add-001
    skill: tag-add
    description: 向标签字典新增标签值
    input:
      dimension: "scene_type"
      value: "决斗"
    expected_output:
      tags_yaml_updated: true
      value_in_dimension: true
      no_duplicate: true
    grader: deterministic

  - task_id: tag-merge-001
    skill: tag-merge
    description: 合并同义标签值
    input:
      dimension: "scene_type"
      old_value: "决斗"
      new_value: "对决"
    expected_output:
      tags_yaml_updated: true
      old_value_removed: true
      new_value_present: true
      scenes_updated: true
    grader: deterministic

# ========== 负向案例 (验证不应触发的行为) ==========

  - task_id: material-add-neg-001
    skill: material-add
    description: 添加不存在的路径应报错而非创建空素材
    input:
      path: "data/novels/nonexistent-file.txt"
      type: novel
    expected_output:
      error_raised: true
      error_type: "file_not_found"
      no_folder_created: true
      index_not_updated: true
    grader: deterministic

  - task_id: material-add-neg-002
    skill: material-add
    description: 无效类型参数应被拒绝
    input:
      path: "data/novels/test-sample.txt"
      type: invalid_type_xyz
    expected_output:
      error_raised: true
      error_type: "invalid_type"
      no_folder_created: true
    grader: deterministic

  - task_id: novel-outline-neg-001
    skill: novel-outline
    description: 不存在的 material_id 应报错而非创建空大纲
    input:
      material_id: nm_novel_nonexistent_xxxx
    expected_output:
      error_raised: true
      error_type: "material_not_found"
      no_outline_created: true
    grader: deterministic

  - task_id: material-search-neg-001
    skill: material-search
    description: 无匹配关键词应返回空结果而非报错
    input:
      keyword: "完全不存在的关键词xyz123"
    expected_output:
      results_returned: true
      result_count: 0
      format_valid: true
      no_error_raised: true
    grader: deterministic

  - task_id: material-search-scene-neg-001
    skill: material-search-scene
    description: 模糊或无意义查询应返回空结果或 Unknown
    input:
      query: "随便乱七八糟的无意义描述"
    expected_output:
      graceful_handling: true
      no_error_raised: true
      empty_or_unknown_result: true
    grader: rubric

  - task_id: tag-add-neg-001
    skill: tag-add
    description: 无效维度名称应被拒绝
    input:
      dimension: "invalid_dimension_xyz"
      value: "测试值"
    expected_output:
      error_raised: true
      error_type: "invalid_dimension"
      tags_yaml_not_updated: true
    grader: deterministic

  - task_id: tag-merge-neg-001
    skill: tag-merge
    description: 不存在的 old_value 应报错而非静默失败
    input:
      dimension: "scene_type"
      old_value: "不存在的标签值xyz"
      new_value: "对决"
    expected_output:
      error_raised: true
      error_type: "tag_not_found"
      tags_yaml_not_updated: true
      scenes_not_updated: true
    grader: deterministic

  - task_id: tag-merge-neg-002
    skill: tag-merge
    description: 合并到不存在的 new_value 应报错
    input:
      dimension: "scene_type"
      old_value: "争吵"
      new_value: "不存在的目标值xyz"
    expected_output:
      error_raised: true
      error_type: "target_tag_not_found"
      tags_yaml_not_updated: true
    grader: deterministic

  - task_id: novel-scenes-neg-001
    skill: novel-scenes
    description: 无效章节范围应报错而非静默处理
    input:
      material_id: nm_novel_test_xxxx
      chapter_range: "999-1000"
    expected_output:
      error_raised: true
      error_type: "invalid_chapter_range"
      no_scenes_created: true
    grader: deterministic

# ========== 更多正向案例 ==========

  - task_id: novel-outline-002
    skill: novel-outline
    description: 为已格式化素材生成完整大纲
    input:
      material_id: nm_novel_20260405_zhbk
