# ========== 更多负向案例 ==========

  - task_id: source-format-neg-001
    skill: source-format
    description: 空素材路径应报错
    input:
      material_id: nm_novel_nonexistent_xxxx
    expected_output:
      error_raised: true
      error_type: "material_not_found"
      no_format_report_created: true
    grader: deterministic

  - task_id: source-format-neg-002
    skill: source-format
    description: 状态为 raw 的素材不应强制清洗
    input:
      material_id: nm_novel_20260405_k8m2
      force: false
    expected_output:
      warning_or_skip: true
      no_unnecessary_processing: true
    grader: deterministic

  - task_id: build-index-neg-001
    skill: build-index
    description: 无场景文件时索引构建应警告
    input:
      material_id: nm_novel_20260405_k8m2
    expected_output:
      warning_raised: true
      empty_index_created: true
      no_error_raised: true
    grader: deterministic

  - task_id: novel-stats-neg-001
    skill: novel-stats
    description: 未处理素材统计应提示需先拆分场景
    input:
      material_id: nm_novel_20260405_k8m2
    expected_output:
      warning_raised: true
      suggestion_given: true
      partial_stats_or_tbd: true
    grader: deterministic

  - task_id: refine-neg-001
    skill: refine
    description: 不存在的素材应报错
    input:
      material_id: nm_novel_nonexistent_xxxx
    expected_output:
      error_raised: true
      error_type: "material_not_found"
      no_files_updated: true
    grader: deterministic

  - task_id: novel-characters-neg-001
    skill: novel-characters
    description: 状态不匹配的素材应提示依赖
    input:
      material_id: nm_novel_20260405_k8m2
    expected_output:
      dependency_warning: true
