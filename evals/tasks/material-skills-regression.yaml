    skill: novel-stats
    description: 无场景数据时统计应提示
    input:
      material_id: nm_novel_20260405_k8m2
    expected_output:
      partial_stats: true
      note: "场景数据不完整"
      fields_missing: ["scene_distribution", "tag_heatmap"]
    grader: deterministic

