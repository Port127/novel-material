    skill: material-search-scene
    description: 指定无索引素材应提示构建索引
    input:
      query: "测试查询"
      material_id: nm_novel_20260405_k8m2
    expected_output:
      suggestion: "需要先执行 novel-scenes 或 build-index"
      graceful_handling: true
    grader: rubric

# ========== Capability Tasks (更难场景) ==========

  - task_id: material-search-scene-cap-001
    skill: material-search-scene
    suite: capability
    description: 多条件复合检索（时间+地点+情绪）
    input:
      query: "夜晚在江边恋人告别的悲伤场景"
    expected_output:
      tags_parsed: true
      parsed_includes: ["setting: 江边", "time: 夜晚", "emotion: 悲伤", "relationship: 恋人"]
      scenes_returned: true
      relevance_score: ">=3"
    grader: rubric
    target_pass_rate: 0.7

  - task_id: novel-scenes-cap-001
    skill: novel-scenes
    suite: capability
    description: 长章节自动拆分全书
    input:
      material_id: nm_novel_20260405_zhbk
      chapter_range: "all"
    expected_output:
      all_scenes_processed: true
      scene_count: ">=100"
      tag_consistency_across_chapters: true
      no_duplicate_scenes: true
    grader: rubric
    target_pass_rate: 0.6

  - task_id: novel-outline-cap-001
    skill: novel-outline
    suite: capability
    description: 多线索小说大纲生成
    input:
      material_id: nm_novel_20260405_zhbk
      multi_thread: true
    expected_output:
      outline_has_multiple_threads: true
      thread_intersections_mapped: true
      pacing_across_threads: true
    grader: rubric
    target_pass_rate: 0.7

  - task_id: tag-merge-cap-001
    skill: tag-merge
    suite: capability
    description: 跨素材批量标签合并
    input:
      dimension: "emotion"
      old_value: "悲伤"
      new_value: "哀伤"
      scope: "all_materials"
    expected_output:
      tags_yaml_updated: true
      all_scenes_updated: true
      update_count_reported: true
    grader: deterministic
    target_pass_rate: 0.8

  - task_id: material-search-scene-cap-002
    skill: material-search-scene
    suite: capability
    description: 模糊语义检索（同义词理解）
    input:
      query: "两个人从陌生人变成朋友的过程"
    expected_output:
      semantic_understanding: true
      scenes_returned: true
      includes_relationship_evolution: true
    grader: rubric
    target_pass_rate: 0.65

  - task_id: novel-stats-cap-001
    skill: novel-stats
    suite: capability
    description: 跨素材对比统计
    input:
      material_ids: ["nm_novel_20260405_zhbk", "nm_novel_20260405_s4t1"]
      compare_mode: true
    expected_output:
      comparison_report_generated: true
      contrast_dimensions: ["emotion", "scene_type", "length"]
      insights_extracted: true
    grader: rubric
    target_pass_rate: 0.75

# ========== 统计 ==========

# 正向案例: 20 (基础) + 6 (capability) = 26
# 负向案例: 26
# Capability: 6
# 总计: 52 tasks

# Regression 正负比例: 20:20 = 1:1
# 总体正负比例: 26:26 = 1:1

# 运行方式:
# python evals/run.py verify --tasks material-skills-regression.yaml
# python evals/run.py run --tasks material-skills-regression.yaml --trials 3
