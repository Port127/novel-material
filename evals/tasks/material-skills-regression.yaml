  - task_id: novel-tags-neg-001
    skill: novel-tags
    description: 未 outline 的素材应提示依赖
    input:
      material_id: nm_novel_20260405_k8m2
    expected_output:
      dependency_warning: true
      suggestion_given: true
    grader: deterministic

  - task_id: material-search-neg-002
    skill: material-search
    description: 空关键词应提示输入
    input:
