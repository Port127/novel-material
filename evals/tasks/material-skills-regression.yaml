      mode: quick
    expected_output:
      error_raised: true
      error_type: "path_not_found"
      pipeline_not_started: true
    grader: deterministic

  - task_id: novel-pipeline-neg-002
    skill: novel-pipeline
    description: 恢复不存在的素材应报错
    input:
      material_id: nm_novel_nonexistent_xxxx
      stage: outline
    expected_output:
      error_raised: true
      error_type: "material_not_found"
    grader: deterministic

