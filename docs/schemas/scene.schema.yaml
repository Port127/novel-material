# scene.yaml schema
# 单个场景的完整描述 + 多维标签
# 路径: data/novels/{material_id}/scenes/{scene_id}.yaml
# 命名: ch{章号}_s{场景序号}.yaml  例: ch0001_s02.yaml

# ====================================================================
# 扁平输出契约 (Flat Output Contract)
# novel-scenes skill 输出必须严格遵循此格式，build-index 脚本按此解析
# ====================================================================
#
# 字段清单（R=必填, O=可选）:
#
# | 字段             | 类型       | R/O | 说明                                  |
# |------------------|------------|-----|---------------------------------------|
# | id               | string     | R   | 场景 ID，格式 ch{NNNN}_s{NN}          |
# | chapter          | string     | R   | 从 chapter_index.yaml 逐字拷贝        |
# | title            | string     | R   | 有语义的概括短语，禁止"场景N"          |
# | summary          | string     | R   | 50-100 字概括核心事件                  |
# | text_range       | [int,int]  | O   | source.txt 中的行号范围 [start, end]   |
# | scene_type       | [string]   | R   | 值域: tags.yaml → scene_type           |
# | conflict         | [string]   | R   | 值域: tags.yaml → conflict（可为空[]） |
# | stakes           | [string]   | R   | 值域: tags.yaml → stakes（可为空[]）   |
# | characters       | [string]   | R   | 出场人物名列表                         |
# | relationship     | [string]   | R   | 值域: tags.yaml → relationship         |
# | interaction      | [string]   | R   | 值域: tags.yaml → interaction          |
# | power_dynamic    | string     | R   | 值域: tags.yaml → power_dynamic        |
# | character_moment | [string]   | R   | 值域: tags.yaml → character_moment     |
# | moral_spectrum   | string     | R   | 值域: tags.yaml → moral_spectrum       |
# | emotion          | [string]   | R   | 值域: tags.yaml → emotion              |
# | tension          | int        | R   | 1-5                                   |
# | reader_effect    | [string]   | R   | 值域: tags.yaml → reader_effect        |
# | plot_stage       | string     | R   | 值域: tags.yaml → plot_stage           |
# | plot_function    | [string]   | R   | 值域: tags.yaml → plot_function        |
# | pacing           | string     | R   | 值域: tags.yaml → pacing              |
# | technique        | [string]   | R   | 值域: tags.yaml → technique            |
# | dialogue_type    | [string]   | R   | 值域: tags.yaml → dialogue_type        |
# | pov              | string     | R   | 值域: tags.yaml → pov                 |
# | info_delivery    | [string]   | R   | 值域: tags.yaml → info_delivery        |
# | setting          | [string]   | R   | 值域: tags.yaml → setting              |
# | scale            | string     | R   | 值域: tags.yaml → scale               |
# | time_weather     | [string]   | R   | 值域: tags.yaml → time_weather         |
# | highlights       | list       | O   | 精彩段落 [{lines: [s,e], note: "..."}] |
# | plot_threads     | list       | O   | refine 阶段补充                       |

# ====================================================================
# 黄金样例 (Golden Example)
# 以下为完整的、可直接通过 yaml.safe_load 解析的场景文件范例
# ====================================================================
#
# id: ch0003_s03
# chapter: 第3章 你摊上大事了！
# title: 车祸激活星辰
# summary: >-
#   大货车失控撞向吕树，他被撞飞的瞬间回忆一生却看不到父母模样。
#   胸前吊坠外壳碎裂，露出星辰形态的内核，化作暖流汇入身体，
#   心脏中白色火焰重燃。
# text_range: [160, 183]
# scene_type:
#   - 觉醒
# conflict:
#   - 生死
# stakes:
#   - 生死
# characters:
#   - 吕树
# relationship: []
# interaction: []
# power_dynamic: 平等
# character_moment:
#   - 身份揭示
# moral_spectrum: 灰色
# emotion:
#   - 绝望
# tension: 5
# reader_effect:
#   - 震撼
# plot_stage: 第一幕-诱因
# plot_function:
#   - 转折
# pacing: 爆发
# technique:
#   - 细节放大
# dialogue_type:
#   - 独白
# pov: 第三人称限制
# info_delivery:
#   - 行动展示
# setting:
#   - 街巷
# scale: 双人戏
# time_weather:
#   - 雪
# highlights:
#   - lines: [169, 178]
#     note: '车祸激活星辰系统，白色火焰重燃的"久别重逢感"是全书核心伏笔'

# ====================================================================
# YAML 书写安全规则
# ====================================================================
#
# 1. 含中文引号（""）或英文引号的字符串值，整行用单引号包裹
#    good:  note: '吕树喊出"你摊上大事了"'
#    bad:   note: 吕树喊出"你摊上大事了"
#
# 2. 冒号后的值若以 { [ * & ! 开头，用单引号包裹
#
# 3. 数值字段（tension, text_range）不加引号
#
# 4. summary 若超过一行，使用 >- 折叠标量（不含尾部换行）

# ====================================================================
# 语义参考（嵌套结构，仅供理解标签分层，不作为输出格式）
# ====================================================================

# A. 场景内容层 — 发生了什么
#   content:
#     scene_type, conflict, stakes
#
# B. 人物层 — 谁和谁、怎么互动
#   characters: [人物名]
#   people:
#     relationship, interaction, power_dynamic,
#     character_moment, moral_spectrum
#
# C. 情感层 — 什么感受
#   emotion: [情绪], tension: 1-5, reader_effect: [效果]
#
# D. 结构层 — 在故事中的位置和作用
#   structure:
#     plot_stage, plot_function, pacing
#
# E. 技法层 — 怎么实现的
#   craft:
#     technique, dialogue_type, pov, info_delivery
#
# F. 场景物理层 — 在什么环境中
#   setting: [空间], scale, time_weather: [时间天气]

# ====================================================================
# 可选扩展（refine 阶段补充）
# ====================================================================
# plot_threads:
#   - thread_id: "线索名称"
#     role: plant | develop | payoff
#     related_scenes: [ch800_s01]
#     confidence: high | medium | low
