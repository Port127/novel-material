# event-unit.schema.yaml
# 事件单元 schema（v2.0）
# 路径: data/novels/{material_id}/events/{event_id}.yaml
# 命名: ev{线索}_{序号}.yaml  例: ev_main_001.yaml, ev_romance_A_001.yaml

schema_version: "2.0"
document_type: event-unit

# ====================================================================
# 字段定义区（唯一真相来源）
# ====================================================================
#
# 校验脚本（validate_yaml.py）从此区提取字段规格。
# 所有字段必须有 type 和 required 声明。
#
# 类型系统：
#   str        → 字符串
#   int        → 整数
#   bool       → 布尔值
#   list[str]  → 字符串列表
#   list[int]  → 整数列表
#   list[dict] → 字典列表
#   dict       → 字典
#
# 值域引用语法：
#   value_domain: "tags.yaml → {dimension}"
#   表示值必须从 tags.yaml 的对应维度选取
#
# R = 必填（required: true）
# O = 可选（required: false）

definitions:
  # ── 核心字段 ──
  core:
    id:
      type: str
      required: true
      pattern: "^ev_[a-z0-9_]+_[0-9]{3}$"
      description: "事件ID，格式 ev{线索}_{序号}"

    material_id:
      type: str
      required: true
      description: "素材ID"

    thread:
      type: str
      required: true
      description: "叙事线索（main/romance_xxx/subplot_xxx/cast_xxx）"

    title:
      type: str
      required: true
      description: "事件标题（有语义概括，禁止纯编号）"

    summary:
      type: str
      required: true
      min_length: 50
      max_length: 500
      description: "事件全过程概括（50-500字）"

    chapters:
      type: list[int]
      required: true
      description: "章节号列表（可不连续，如 [1, 3, 5, 7]）"

    chapter_titles:
      type: list[str]
      required: false
      description: "从 chapter_index.yaml 拷贝对应章节标题"

    text_range:
      type: list[int]
      required: false
      length: 2
      description: "source.txt 行号范围 [start, end]（仅本事件涉及的段落）"

    lines:
      type: list[int]
      required: false
      length: 2
      description: "原文行号范围 [start, end]"

    lines_approximate:
      type: bool
      required: false
      default: false
      description: "行号是否为估算值"

    event_type:
      type: list[str]
      required: true
      value_domain: "tags.yaml → event_type"
      description: "事件类型（从 tags.yaml 选取，可多选）"

    event_stage:
      type: str
      required: true
      value_domain: "tags.yaml → event_stage"
      description: "事件阶段（事件在全书中的发展位置）"

    outcome:
      type: str
      required: true
      value_domain: "tags.yaml → outcome"
      description: "事件结果"

    event_arc:
      type: str
      required: false
      description: "事件弧线简述（起点→发展→结局）"

  # ── 人物层 ──
  characters:
    characters:
      type: list[str]
      required: true
      description: "出场人物名列表"

    primary_character:
      type: str
      required: true
      description: "事件主角"

    relationship:
      type: list[str]
      required: true
      value_domain: "tags.yaml → relationship"
      description: "人物关系类型"

    interaction:
      type: list[str]
      required: true
      value_domain: "tags.yaml → interaction"
      description: "互动方式"

    power_dynamic:
      type: str
      required: true
      value_domain: "tags.yaml → power_dynamic"
      description: "权力位差"

    character_moment:
      type: list[str]
      required: true
      value_domain: "tags.yaml → character_moment"
      description: "人物弧光时刻"

    moral_spectrum:
      type: str
      required: true
      value_domain: "tags.yaml → moral_spectrum"
      description: "道德光谱"

  # ── 情感层 ──
  emotion:
    emotion_arc:
      type: list[str]
      required: true
      value_domain: "tags.yaml → emotion"
      description: "情绪变化轨迹 [起点→中间→结局]"

    tension:
      type: int
      required: true
      min: 1
      max: 5
      description: "张力值（1-5）；legacy 别名: tension_peak"

    tension_curve:
      type: list[int]
      required: false
      description: "分段张力值（对应各章节或阶段）"

    reader_effect:
      type: list[str]
      required: true
      value_domain: "tags.yaml → reader_effect"
      description: "期望读者感受"

  # ── 结构层 ──
  structure:
    plot_stage:
      type: str
      required: true
      value_domain: "tags.yaml → plot_stage"
      description: "剧情阶段"

    plot_function:
      type: list[str]
      required: true
      value_domain: "tags.yaml → plot_function"
      description: "情节功能"

    pacing:
      type: str
      required: true
      value_domain: "tags.yaml → pacing"
      description: "节奏型"

  # ── 技法层 ──
  craft:
    technique:
      type: list[str]
      required: true
      value_domain: "tags.yaml → technique"
      description: "叙事技法"

    dialogue_type:
      type: list[str]
      required: true
      value_domain: "tags.yaml → dialogue_type"
      description: "对话类型"

    pov:
      type: str
      required: true
      value_domain: "tags.yaml → pov"
      description: "视角"

    info_delivery:
      type: list[str]
      required: true
      value_domain: "tags.yaml → info_delivery"
      description: "信息投放方式"

  # ── 物理层 ──
  physical:
    setting:
      type: list[str]
      required: true
      value_domain: "tags.yaml → setting"
      description: "空间类型"

    scale:
      type: str
      required: true
      value_domain: "tags.yaml → scale"
      description: "事件人数规模"

    time_weather:
      type: list[str]
      required: true
      value_domain: "tags.yaml → time_weather"
      description: "时间与天气"

  # ── 冲突与赌注 ──
  conflict:
    conflict:
      type: list[str]
      required: true
      value_domain: "tags.yaml → conflict"
      description: "冲突类型"

    stakes:
      type: list[str]
      required: true
      value_domain: "tags.yaml → stakes"
      description: "赌注（事件中赌上了什么）"

  # ── 可选扩展字段 ──
  optional:
    highlights:
      type: list[dict]
      required: false
      description: "精彩段落标记"

    sub_events:
      type: list[str]
      required: false
      description: "子事件ID列表"

    plot_threads:
      type: list[str]
      required: false
      description: "refine阶段补充的剧情线索关联"

    intersects_mainline_at:
      type: list[dict]
      required: false
      description: "与主线的交汇点（仅支线/感情线事件填写）"

    hooks:
      type: any
      required: false
      description: "钩子标记（支持 dict 结构或 list[dict] 格式）"

    # hooks 的两种格式：
    # 格式A（dict）：{chapter_end: [], items_crossing: [], ...}
    # 格式B（list）：[{hook_type: xxx, crossing_type: xxx, ...}]

# ====================================================================
# 示例区（仅供参考，不参与校验）
# ====================================================================

