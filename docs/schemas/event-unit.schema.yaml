# ====================================================================
# 文档说明（人类阅读）
# ====================================================================

documentation:
  purpose: "事件单元 = 一个完整的戏剧动作（有起点、发展、结局）。事件可能跨越 5-60 章，以事件完整性为切分依据。同一章节可被多个事件覆盖，chapters 可为不连续列表。"

  thread_types:
    main: "主线 - 主角核心叙事线"
    romance_xxx: "感情线 - 特定角色的感情发展"
    subplot_xxx: "支线 - 重要支线剧情"
    cast_xxx: "群像线 - 其他角色的个人故事"
    world_xxx: "世界观线 - 世界层面的叙事"

  hook_types:
    chapter_end: "章末悬念"
    items_crossing: "跨事件道具钩子"
    character_crossing: "跨事件人物关联"
    info_hint: "信息钩子标记"

  yaml_safety_rules:
    rule_1: "含中文引号的字符串值，整行用单引号包裹"
    rule_2: "数值字段不加引号"
    rule_3: "summary 超过一行使用 >- 折叠标量"
    rule_4: "列表项破折号后必须有空格"
