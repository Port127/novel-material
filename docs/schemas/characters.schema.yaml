# characters.yaml schema
# 人物名册 + 关系网 + 人物弧线
# 路径: data/novels/{material_id}/characters.yaml

material_id: nm_xxx

# 人物名册
roster:
  - name: "角色名"
    aliases: [别名, 外号]
    role: protagonist              # protagonist / antagonist / supporting / minor
    archetype: 英雄                # 角色原型（从 tags.yaml archetype 选取）
    narrative_function: 推动主线    # 叙事功能（从 tags.yaml narrative_function 选取）
    first_appearance: "第X章"
    description: "核心特征一句话"
    traits: [性格特征1, 性格特征2]
    moral_spectrum: 正义             # 正义 / 灰色 / 黑暗 / 亦正亦邪

    # 写作参考维度（可选，对齐 novel 项目的人物卡片深度字段）
    # 用于跨项目检索时提供更丰富的角色画像
    psychology:
      fatal_flaw: "会害到自己或他人的关键缺陷"
      obsession: "长期追求、放不下的事物"
      soft_spot: "最在意的人或事"
      misbelief: "坚信但并不完全正确的信念"
      contrast_habit: "与身份或表象相反的小习惯"
      tragedy_trigger: "容易触发错过、误判、等待落空的结构点"

    # 人物弧线
    arc:
      - stage: "起点"
        state: "人物在故事开始时的状态"
        chapter: 1
      - stage: "转变"
        state: "关键变化描述"
        trigger: "触发转变的事件"
        chapter: 15
      - stage: "终点"
        state: "人物在故事结束时的状态"
        chapter: 36

# 关系网
relations:
  - from: "角色A"
    to: "角色B"
    type: 师徒                      # 恋人/师徒/对手/父子/挚友/同门/君臣/主仆/...
    description: "关系描述"
    evolution:                      # 关系变化轨迹（可选）
      - stage: "初期"
        state: "信任依赖"
        chapter: 5
      - stage: "破裂"
        state: "背叛决裂"
        chapter: 26

# 阵营/势力（人物视角：关注谁属于哪个阵营）
# 与 worldbuilding.yaml 的 factions_world 互补（后者关注势力本身的设定）
factions:
  - name: "势力名称"
    members: [角色1, 角色2]
    leader: "角色名"
    stance: "立场描述"
    internal_hierarchy: ["层级1", "层级2"]
    rival_factions: ["对立势力"]
