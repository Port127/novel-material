# plot_index.yaml schema
# 跨小说剧情结构全局索引
# 路径: data/plot_index.yaml
# 由 build-index 自动聚合，只读

entries:
  - material_id: nm_xxx
    novel_name: "《书名》"
    genre: [科幻]                    # 从小说级 tags.yaml 读取
    total_scenes: 907
    structure:
      plot_stages:                   # 各阶段场景分布
        开篇: 15
        第一幕-诱因: 45
        第一幕-发展: 120
        第二幕-对抗: 280
        中点: 30
        第二幕-低谷: 150
        第三幕-高潮: 180
        第三幕-收束: 70
        尾声: 17
      turning_points:                # 主要转折点（3-8 个）
        - chapter: 89
          description: "简要描述"
          plot_function: 转折
      hooks_count: 42                # 钩子总数
      hooks_verified: 38             # 已验证回收的钩子数
    dominant_functions:              # 高频情节功能 Top-5
      - {function: 铺垫, count: 320}
    pacing_profile:
      avg_tension: 3.2              # 全书平均张力
      peak_tension_chapter: 302     # 张力最高章节
      tension_variance: 1.1         # 张力方差（节奏波动度）
