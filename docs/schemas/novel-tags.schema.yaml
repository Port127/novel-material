# tags.yaml schema (小说级)
# 每部小说的整体多维标签
# 路径: data/novels/{material_id}/tags.yaml
# 注意：这是小说级标签，描述全书特征
#       事件级标签在每个 event.yaml 内部

material_id: nm_xxx

# 题材与类型
genre: [科幻, 硬科幻]
sub_genre: [太空歌剧, 末日]

# 全书主题
theme: [文明冲突, 人性, 科技伦理, 信仰与背叛]

# 全书基调
tone: [沉重, 冷峻, 宏大]

# 全书叙事特征
narrative:
  structure: 多线叙事               # 单线/双线/多线/环形/碎片化/...
  pov_style: 第三人称多视角          # 第一人称/第三人称限制/全知/多视角轮转/...
  time_handling: 双时间线            # 线性/倒叙/多时间线/时间跳跃/...

# 全书写作风格
style:
  prose: [冷叙述, 理性克制]         # 华丽/朴素/冷叙述/诗化/口语化/...
  strength: [概念构思, 世界观设定]   # 人物塑造/对话/概念构思/世界观设定/节奏控制/氛围营造/...
  weakness: []                      # 可留空或标注

# 叙事套路/常见模式（从 tags.yaml tropes 选取）
tropes: [废柴逆袭, 扮猪吃虎]

# 适合参考的方向（检索提示）
good_for: [宏大叙事参考, 硬科幻设定参考, 多线叙事结构参考]
