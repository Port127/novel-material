# novel-tags.yaml schema
# 每部小说的整体多维标签
# 路径: data/novels/{material_id}/tags.yaml
# 由 pipeline-analyze 阶段生成，描述全书特征
# 注意：事件级标签在每个 event-unit.yaml 内部，与此不同

# ====================================================================
# 字段说明
# ====================================================================
#
# 小说级标签用于素材检索和跨书比较，所有值应从 tags.yaml 对应维度选取。
#
# R = 必填, O = 可选

# ====================================================================
# 基本信息
# ====================================================================

material_id: nm_xxx                             # R | 素材ID

# ====================================================================
# 题材与类型
# ====================================================================

genre: [科幻, 硬科幻]                           # R | 主类型（tags.yaml → genre）
sub_genre: [太空歌剧, 末日]                     # O | 子类型

# ====================================================================
# 全书主题
# ====================================================================

theme: [文明冲突, 人性, 科技伦理, 信仰与背叛]    # R | 主题标签（tags.yaml → theme）

# ====================================================================
# 全书基调
# ====================================================================

tone: [沉重, 冷峻, 宏大]                         # R | 叙事基调（tags.yaml → tone）

# ====================================================================
# 全书叙事特征
# ====================================================================

narrative:
  structure: 多线叙事                           # R | 叙事结构（单线/双线/多线/环形/碎片化）
  pov_style: 第三人称多视角                      # R | 视角风格（第一人称/第三人称限制/全知/多视角轮转）
  time_handling: 双时间线                        # R | 时间处理（线性/倒叙/多时间线/时间跳跃）

# ====================================================================
# 全书写作风格
# ====================================================================

style:
  prose: [冷叙述, 理性克制]                      # O | 文笔风格（华丽/朴素/冷叙述/诗化/口语化）
  strength: [概念构思, 世界观设定]               # O | 写作长处
  weakness: []                                  # O | 写作短板（可留空）

# ====================================================================
# 叙事套路/常见模式
# ====================================================================

tropes: [废柴逆袭, 扮猪吃虎]                     # O | 套路标签（tags.yaml → tropes）

# ====================================================================
# 适合参考的方向（检索提示）
# ====================================================================

good_for: [宏大叙事参考, 硬科幻设定参考, 多线叙事结构参考]  # O | 检索提示语，用于 material-search
