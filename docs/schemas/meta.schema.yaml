# meta.yaml schema
# 每部小说的元数据文件
# 路径: data/novels/{material_id}/meta.yaml
#
# 此文件随 pipeline 推进逐步扩充，早期阶段只有基础字段，
# 后续阶段的脚本和 skill 会追加 pipeline、event_batches 等。

# ====================================================================
# 基础字段（material-add 创建时即写入）
# ====================================================================

material_id: nm_{type}_{YYYYMMDD}_{random4}
type: novel
name: "《书名》"
author: 作者名
source: source.txt
added: YYYY-MM-DD

# 状态流：raw → outlined → tagged → complete → refined
#
#   raw       仅有原文入库（source-format 完成后 pipeline.formatted: true，但 status 仍为 raw）
#   outlined  pipeline-analyze 进行中或完成（outline + worldbuilding + characters）
#   tagged    pipeline-analyze 完成（小说级标签已生成）。注意：事件尚未拆分
#   complete  pipeline-events 完成（事件全部拆分 + 索引已构建）
#   refined   pipeline-finalize 完成（精调 + 统计报告已生成）
#
status: raw

# ====================================================================
# pipeline 进度追踪（各阶段逐步追加字段）
# ====================================================================

pipeline:
  # 流程入口模式（由调度器写入）
  mode: full                 # full | quick | ingest | import

  # 当前正在执行的阶段
  current_stage: events      # ingest | analyze | events | finalize | complete

  # 已完成的阶段列表（有序追加）
  stages_completed:
    - material-add
    - source-format
    - outline
    - worldbuilding
    - characters
    - tags
    # - events, build-index, refine, novel-stats

  # ── ingest 阶段 ──
  formatted: true            # 格式清洗完成
  format_date: YYYY-MM-DD
  chapters: 1070             # 总章节数（从 chapter_index.yaml 获取）

  # ── analyze 阶段 ──
  outlined_at: YYYY-MM-DD
  worldbuilding_at: YYYY-MM-DD
  characters_at: YYYY-MM-DD
  tags_at: YYYY-MM-DD

  # ── events 阶段 ──
  events_processed:          # 已处理的章节批次范围（有序追加）
    - "1-5"
    - "6-10"
  events_total_chapters: 1070

  # ── build-index 阶段 ──
  index_building: false      # 索引构建中（中间状态，防中断丢失）
  index_built: false         # 索引是否已构建
  index_at: "2026-04-05T12:00:00Z"
  manifest_events: 907       # 事件清单中的事件总数

  # ── extract-entities 阶段 ──
  entities_extracted: false  # 原文实体是否已提取
  entities_extracted_at: "2026-04-05T12:00:00Z"

  # ── validate-completeness 阶段 ──
  completeness_validated: false  # 完整性是否已验证
  completeness_score: 0.95       # 覆盖率（0.0-1.0）
  completeness_critical_count: 0 # critical 级别遗漏数

  # ── ai-backfill 阶段 ──
  backfill_done: false       # AI 补录是否完成
  backfill_at: "2026-04-05T12:00:00Z"
  backfill_summary:          # 补录摘要
    entities_backfilled: 15  # 补录实体数
    events_updated: 8        # 更新事件数
    events_created: 2        # 新建事件数

  # ── refine 阶段 ──
  refine_hash: ""               # 上次 refine 时事件数据的 hash（用于检测变化）
  refined: false
  refined_at: "2026-04-05T12:00:00Z"
  refine_summary:
    outline_changes: 3
    character_changes: 5
    tag_changes: 2
  refine_batches:            # refine 分批状态
    current_batch: 1         # 当前批次（1-6）
    batches_completed: 0     # 已完成批次数
    stats_merged: false      # batch-1 完成
    hooks_verified: false    # batch-2 完成
    characters_refined: false # batch-3 完成
    relations_verified: false # batch-4 完成
    worldbuilding_refined: false # batch-5 完成
    cleanup_done: false      # batch-6 完成

  # ── novel-stats 阶段 ──
  stats_generated: false
  stats_at: "2026-04-05T12:00:00Z"

# ====================================================================
# 批次质量数据（quality_audit.py 写入）
# ====================================================================

event_batches:
  - range: "1-5"
    total: 12                # 本批事件数
    tag_diversity: 0.85      # 标签组合唯一率（< 0.5 判定失败）
    empty_field_rate: 0.12   # 空字段占比（> 0.3 判定失败）
    avg_tension: 2.4
    summary_dedup: 1.0       # 摘要去重率
    pass: true               # 本批是否通过

quality_drift:               # 全书审计时生成，对比前后期批次
  early_avg_diversity: 0.88
  late_avg_diversity: 0.82
  drift_detected: false

# ====================================================================
# 导入素材的额外字段（material-import 写入）
# ====================================================================

