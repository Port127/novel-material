# outline 文件夹结构 schema
# 路径: data/novels/{material_id}/outline/
#
# 大纲采用文件夹结构，支持模块化和按需加载
# 各模块根据小说特征自动启用（必选 + 可选机制）

# ─────────────────────────────────────────────────────────
# 文件夹结构
# ─────────────────────────────────────────────────────────

# outline/
# ├── _index.yaml              # 必选：概览 + 模块索引 + 统计
# ├── structure.yaml           # 必选：结构骨架（幕/序列/节拍）
# ├── plotlines.yaml           # 可选：情节线索追踪
# ├── hooks_network.yaml       # 可选：钩子网络
# ├── pacing_curve.yaml        # 可选：节奏曲线
# ├── subplots.yaml            # 可选：支线网络
# ├── themes.yaml              # 可选：主题演变
# └── emotional_arc.yaml       # 可选：情绪曲线

# ─────────────────────────────────────────────────────────
# _index.yaml（必选）
# ─────────────────────────────────────────────────────────

# 大纲概览 + 模块导航 + 快速统计
# 路径: outline/_index.yaml

material_id: nm_xxx

# 全书概要
premise: "一句话核心前提"
theme: [生存与文明, 科学与人道]
tone: [硬科幻, 冷峻, 哲思]

# 启用的模块（根据小说特征自动判断）
modules_enabled:
  - structure      # 必选
  - plotlines      # 可选：多线叙事时启用
  - hooks_network  # 可选：伏笔密集时启用
  - pacing_curve   # 可选：章节数 > 30 时启用
  - subplots       # 可选：支线 > 3 时启用
  - themes         # 可选：主题复杂时启用
  - emotional_arc  # 可选：情绪导向时启用

# 结构索引（快速导航）
structure_summary:
  acts: 3
  sequences: 12
  beats: 48
  act_ranges:
    - act: 1
      title: "发现危机"
      chapters: [1, 10]
    - act: 2
      title: "斗争与抉择"
      chapters: [11, 25]
    - act: 3
      title: "终极对决"
      chapters: [26, 36]

# 情节线索索引（启用 plotlines 模块时）
plotlines_summary:
  count: 4
  names: [主线, 科技线, 伦理线, 文明线]

# 钩子统计（启用 hooks_network 模块时）
hooks_stats:
  total: 45
  verified: 38
  pending: 7

# 支线统计（启用 subplots 模块时）
subplots_stats:
  count: 5

# 主题统计（启用 themes 模块时）
themes_stats:
  count: 3

# ─────────────────────────────────────────────────────────
# structure.yaml（必选）
# ─────────────────────────────────────────────────────────

# 结构骨架：幕 → 序列 → 节拍
# 路径: outline/structure.yaml

material_id: nm_xxx

# 三层结构
acts:
  - act: 1
    title: "幕名"
    chapters: [1, 10]
    arc: "本幕叙事弧线"
    sequences:
      - sequence: 1
        title: "序列名"
        chapters: [1, 3]
        beats:
          - beat: 1
            title: "节拍名"
            chapter: 1
            description: "节拍描述"
            tension: 2
          - beat: 2
            title: "节拍名"
            chapter: 2
            description: "节拍描述"
            tension: 3
      - sequence: 2
        title: "序列名"
        chapters: [4, 6]
        beats: [...]
    turning_point:
      chapter: 10
      description: "转折点描述"
      type: "转折类型"  # inciting_incident / first_threshold / midpoint / dark_night / climax

# 结构模板识别（可选）
structure_pattern:
  type: "三幕式"  # 三幕式 / 英雄之旅 / 五幕式 / 环形结构 / ...
  description: "简要说明"

# ─────────────────────────────────────────────────────────
# plotlines.yaml（可选，多线叙事时启用）
# ─────────────────────────────────────────────────────────

# 情节线索追踪：各线的起点 → 转折 → 高潮 → 收束
# 路径: outline/plotlines.yaml

material_id: nm_xxx

plotlines:
  - name: "主线"
    description: "线索简述"
    importance: primary  # primary / secondary / tertiary
    chapters_covered: [1, 36]
    stages:
      - stage: origin
        chapter: 1
        description: "线索起点"
      - stage: development
        chapter: 10
        description: "线索发展"
      - stage: climax
        chapter: 28
        description: "线索高潮"
      - stage: resolution
        chapter: 36
        description: "线索收束"
    key_events: [event_id_1, event_id_2]
    intersections_with: [线索B, 线索C]  # 与其他线索的交汇点

  - name: "科技线"
    description: "科技发现脉络"
    importance: secondary
    chapters_covered: [3, 30]
    stages: [...]
    key_events: [...]
    intersections_with: [主线]

# 多线交织矩阵（可选）
intersection_matrix:
  - plotline_a: 主线
    plotline_b: 科技线
    intersect_chapters: [5, 15, 25]
    description: "交汇描述"

# ─────────────────────────────────────────────────────────
# hooks_network.yaml（可选，伏笔密集时启用）
# ─────────────────────────────────────────────────────────

# 钩子网络：埋设 → 回收链
# 路径: outline/hooks_network.yaml

material_id: nm_xxx

# 铆合链列表
chains:
  - hook_id: hook_001
    hook_type: 道具钩子              # 道具钩子/人物钩子/悬念钩子/信息钩子/情感钩子
    crossing_type: 因果铆合          # 反转铆合/因果铆合/悬念铆合/期待铆合
    planted:
      chapter: 3
      description: "钩子描述"
      source: plot_function           # hooks字段 或 plot_function
    harvested:
      chapter: 28
      description: "回收描述"
    confidence: high                 # high/medium/low

# 待回收钩子
pending:
  - hook_id: hook_002
    hook_type: 信息钩子
    crossing_type: 反转铆合
    planted_chapter: 12
    detail: "待回收钩子描述"
    confidence: low

# 统计
stats:
  total_hooks: 45
  verified_hooks: 38
  pending_hooks: 7
  by_type:
    道具钩子: 15
    人物钩子: 12
    悬念钩子: 8
  by_crossing:
    反转铆合: 15
    因果铆合: 20
    悬念铆合: 8

# ─────────────────────────────────────────────────────────
# pacing_curve.yaml（可选，章节数 > 30 时启用）
# ─────────────────────────────────────────────────────────

# 节奏曲线：关键章节张力标注
# 路径: outline/pacing_curve.yaml

material_id: nm_xxx

# 张力曲线（关键节点）
tension_curve:
  - chapter: 1
    tension: 2
    note: "日常切入"
    beat_type: setup
  - chapter: 10
    tension: 3
    note: "危机显现"
    beat_type: inciting_incident
  - chapter: 18
    tension: 4
    note: "中点反转"
    beat_type: midpoint
  - chapter: 28
    tension: 5
    note: "高潮"
    beat_type: climax
  - chapter: 36
    tension: 2
    note: "收尾"
    beat_type: resolution

# 节奏特征摘要
pacing_summary:
  overall: "慢启动渐加速"
  peaks: [28, 35]  # 张力峰值章节
  valleys: [1, 36]  # 张力低谷章节
  avg_tension: 3.2

# ─────────────────────────────────────────────────────────
# subplots.yaml（可选，支线 > 3 时启用）
# ─────────────────────────────────────────────────────────

# 支线网络：各支线与主线的关系
# 路径: outline/subplots.yaml

material_id: nm_xxx

subplots:
  - name: "爱情支线"
    description: "支线简述"
    importance: secondary  # primary / secondary / tertiary
    protagonist: "角色名"  # 支线主角
    chapters_covered: [5, 30]
    relation_to_mainline: parallel  # parallel / intertwining / counterpoint / framing
    resolution_type: resolved  # resolved / unresolved / tragic / open
    stages:
      - stage: introduction
        chapter: 5
        description: "支线引入"
      - stage: development
        chapter: 15
        description: "支线发展"
      - stage: climax
        chapter: 25
        description: "支线高潮"
      - stage: resolution
        chapter: 30
        description: "支线收束"

# 支线-主线交织图
mainline_integration:
  - subplot: 爱情支线
    anchor_chapters: [10, 20]  # 与主线交汇的章节
    integration_type: emotional  # thematic / emotional / causal / parallel

# ─────────────────────────────────────────────────────────
# themes.yaml（可选，主题复杂时启用）
# ─────────────────────────────────────────────────────────

# 主题演变：主题在全书中的展开
# 路径: outline/themes.yaml

material_id: nm_xxx

themes:
  - name: "生存与文明"
    description: "主题简述"
    importance: primary  # primary / secondary / tertiary
    evolution:
      - stage: introduction
        chapter: 1
        statement: "主题首次呈现"
      - stage: complication
        chapter: 15
        statement: "主题深化/冲突"
      - stage: resolution
        chapter: 36
        statement: "主题最终呈现"
    motifs:  # 母题（反复出现的元素）
      - motif: "黑暗森林"
        appearances: [8, 20, 35]
        meaning: "宇宙生存法则的隐喻"
    symbols:  # 象征
      - symbol: "红岸基地"
        meaning: "人类科技野心的象征"

# 主题交织
theme_intersections:
  - theme_a: 生存与文明
    theme_b: 科学与人道
    conflict_chapters: [10, 25]
    resolution: "共存但代价巨大"

# ─────────────────────────────────────────────────────────
# emotional_arc.yaml（可选，情绪导向时启用）
# ─────────────────────────────────────────────────────────

# 情绪曲线：读者情绪预期管理
# 路径: outline/emotional_arc.yaml

material_id: nm_xxx

# 读者情绪曲线
emotional_curve:
  - chapter: 1
    emotion: curiosity  # curiosity / suspense / fear / hope / anger / sadness / relief / ...
    intensity: 2
    trigger: "悬念引入"
    expectation_created: "读者期待：悬念何时揭晓"
  - chapter: 10
    emotion: fear
    intensity: 4
    trigger: "危机显现"
    expectation_created: "读者期待：如何应对危机"
  - chapter: 28
    emotion: tension
    intensity: 5
    trigger: "高潮"
    expectation_created: "读者期待：最终结果"
  - chapter: 36
    emotion: relief
    intensity: 2
    trigger: "收尾"
    expectation_fulfilled: "悬念揭晓"

# 情绪节奏
emotional_rhythm:
  dominant_emotions: [curiosity, fear, tension]
  emotion_transitions:
    - from: curiosity
      to: fear
      chapter: 8
      trigger: "危机信号"