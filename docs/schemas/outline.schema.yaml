# outline.yaml schema
# 故事大纲：全书骨架 + 节奏 + 转折点
# 路径: data/novels/{material_id}/outline.yaml

material_id: nm_xxx

# 全书概要
premise: "一句话核心前提"
theme: [主题1, 主题2]
tone: [整体基调]

# 结构骨架（按幕/卷拆分）
structure:
  - act: "第一幕"
    title: "幕名（可选）"
    chapters: [1, 2, 3]           # 对应章节号范围
    arc: "本幕主要叙事弧线"
    key_event: "核心事件"
    turning_point: "转折点描述"
    pacing_note: "节奏特征（如：慢启动渐加速）"

# 时间线（多线叙事时使用）
timelines:
  - name: "主线名称"
    description: "简述"
    chapters: [1, 3, 5]           # 涉及的章节

# 钩子网络（钩子系统统一采集，反转铆合对应 plot_function 伏笔埋设/回收）
hooks_network:
  # 铆合链列表（埋设→回收）
  chains:
    - hook_id: hook_001
      hook_type: 道具钩子              # 道具钩子/人物钩子/悬念钩子/信息钩子/情感钩子
      crossing_type: 因果铆合          # 反转铆合/因果铆合/悬念铆合/期待铆合
      planted:
        chapter: 3                     # 埋设章节
        description: "钩子描述"        # 埋设内容
        source: plot_function           # 来源：hooks字段 或 plot_function
      harvested:
        chapter: 28                    # 回收章节（已知时填写）
        description: "回收描述"        # 回收内容
      confidence: high                 # high/medium/low
      
  # 待回收钩子
  pending:
    - hook_id: hook_002
      hook_type: 信息钩子
      crossing_type: 反转铆合
      planted_chapter: 12
      detail: "待回收的钩子描述"
      confidence: low
      
  # 统计数据
  stats:
    total_hooks: 45
    verified_hooks: 38
    pending_hooks: 7
    by_type:                           # 按钩子类型分布
      道具钩子: 15
      人物钩子: 12
      悬念钩子: 8
    by_crossing:                       # 按铆合形式分布
      反转铆合: 15                     # 反转铆合（传统"伏笔"）
      因果铆合: 20
      悬念铆合: 8

# 节奏曲线标注（可选）
pacing_curve:
  - chapter: 1
    tension: 2
    note: "日常切入"
  - chapter: 12
    tension: 4
    note: "中点反转"
  - chapter: 32
    tension: 5
    note: "最终高潮"
