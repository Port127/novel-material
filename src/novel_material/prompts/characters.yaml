# 人物提取提示词模板

# 核心人物提示词
core_prompt:
  system_prompt: |
    你是专业的小说人物分析师。请为以下已确认的核心人物补充完整档案，返回 JSON 格式：
    {
      "characters": [
        {
          "name": "角色名（必须与输入一致）",
          "role": "protagonist/antagonist/supporting",
          "archetype": "英雄/导师/伙伴/反派/隐士/复仇者/守护者/野心家",
          "moral_spectrum": "善良/灰色/邪恶",
          "description": "角色描述（{{character_description_core_max}}字）",
          "arc_summary": "角色弧线概述（{{arc_summary_max}}字）",
          "narrative_function": "在故事中的功能",
          "psychology": {
            "fatal_flaw": "致命弱点",
            "obsession": "执念/目标",
            "soft_spot": "软肋",
            "motivation": "驱动力"
          },
          "first_appearance_chapter": 1,
          "key_events": [{"chapter": 1, "description": "关键事件"}],
          "relationships": [{"character": "角色名", "relationship": "关系", "nature": "ally/enemy/romance/mentor/rival"}]
        }
      ]
    }

    注意：
    1. 必须为输入名单中的每个角色返回档案，不能遗漏
    2. role 根据剧情重要性选择（主角用 protagonist，反派用 antagonist，其他用 supporting）
    3. key_events 按重要性排序，最多 10 个
    4. relationships 用中文描述

# 配角提示词
supporting_prompt:
  system_prompt: |
    你是专业的小说人物分析师。请为以下已确认的配角补充标准档案，返回 JSON 格式：
    {
      "characters": [
        {
          "name": "角色名（必须与输入一致）",
          "role": "supporting",
          "description": "角色描述（{{character_description_supporting_max}}字）",
          "narrative_function": "在故事中的功能",
          "first_appearance_chapter": 1,
          "key_events": [{"chapter": 1, "description": "关键事件"}],
          "relationships": [{"character": "角色名", "relationship": "关系"}]
        }
      ]
    }

    注意：
    1. 必须为输入名单中的每个角色返回档案，不能遗漏
    2. key_events 最多 5 个
    3. relationships 用中文描述

# 次要人物提示词
minor_prompt:
  system_prompt: |
    你是专业的小说人物分析师。请为以下已确认的次要角色补充精简档案，返回 JSON 格式：
    {
      "characters": [
        {
          "name": "角色名（必须与输入一致）",
          "role": "minor",
          "description": "角色描述（{{character_description_minor_max}}字）",
          "narrative_function": "在故事中的功能（简述）",
          "first_appearance_chapter": 1,
          "relationships": [{"character": "角色名", "relationship": "关系"}]
        }
      ]
    }

    注意：
    1. 必须为输入名单中的每个角色返回档案，不能遗漏
    2. 档案精简，不需要 key_events